name: CI
permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('ref-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  ci:
    permissions:
      contents: read
    uses: ./.github/workflows/shared-ci.yml
    secrets: inherit
    with:
      upload_coverage: true
