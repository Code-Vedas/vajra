name: Shared CI
permissions:
  contents: read
env:
  BUNDLE_PATH: ${{ github.workspace }}/vendor/bundle
  BUNDLE_JOBS: "4"
  BUNDLE_RETRY: "3"
  RUBY_VERSION: 3.4.3

on:
  workflow_call:
    inputs:
      upload_coverage:
        required: false
        type: boolean
        default: false
    secrets:
      QLTY_COVERAGE_TOKEN:
        required: false

jobs:
  rubocop:
    name: RuboCop · Ruby ${{ matrix.ruby_version }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby_version:
          - "3.2"
          - "3.4"
          - "4.0"
    steps:
      - uses: actions/checkout@v6
      - name: Install apt packages
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential clang git libyaml-dev pkg-config
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby_version }}
          bundler-cache: false
      - name: Restore bundle cache
        uses: actions/cache@v5
        with:
          path: ${{ env.BUNDLE_PATH }}
          key: ${{ runner.os }}-ruby-${{ matrix.ruby_version }}-bundle-${{ hashFiles('gems/**/Gemfile.lock', 'docs/Gemfile.lock', 'danger/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-ruby-${{ matrix.ruby_version }}-bundle-
      - name: Install bundles
        run: scripts/ci-install-bundles
        env:
          CI_RUBY_VERSION: ${{ matrix.ruby_version }}
      - name: Run RuboCop
        run: scripts/run-rubocop-all

  reek:
    name: Reek and RBS · Ruby ${{ matrix.ruby_version }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby_version:
          - "3.2"
          - "3.4"
          - "4.0"
    steps:
      - uses: actions/checkout@v6
      - name: Install apt packages
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential cmake git libyaml-dev pkg-config
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby_version }}
          bundler-cache: false
      - name: Restore bundle cache
        uses: actions/cache@v5
        with:
          path: ${{ env.BUNDLE_PATH }}
          key: ${{ runner.os }}-ruby-${{ matrix.ruby_version }}-bundle-${{ hashFiles('gems/**/Gemfile.lock', 'docs/Gemfile.lock', 'danger/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-ruby-${{ matrix.ruby_version }}-bundle-
      - name: Install bundles
        run: scripts/ci-install-bundles
        env:
          CI_RUBY_VERSION: ${{ matrix.ruby_version }}
      - name: Run Reek
        run: scripts/run-reek-all
      - name: Run C++ lint
        run: scripts/run-clint-all
      - name: Validate RBS
        run: scripts/run-rbs-all

  test:
    name: Unit Tests · Ruby ${{ matrix.ruby_version }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [rubocop, reek]
    strategy:
      fail-fast: false
      matrix:
        ruby_version:
          - "3.2"
          - "3.4"
          - "4.0"
    steps:
      - uses: actions/checkout@v6
      - name: Install apt packages
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential git libyaml-dev pkg-config
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby_version }}
          bundler-cache: false
      - name: Restore bundle cache
        uses: actions/cache@v5
        with:
          path: ${{ env.BUNDLE_PATH }}
          key: ${{ runner.os }}-ruby-${{ matrix.ruby_version }}-bundle-${{ hashFiles('gems/**/Gemfile.lock', 'docs/Gemfile.lock', 'danger/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-ruby-${{ matrix.ruby_version }}-bundle-
      - name: Install bundles
        run: scripts/ci-install-bundles
        env:
          CI_RUBY_VERSION: ${{ matrix.ruby_version }}
      - name: Run unit tests
        run: scripts/run-rspec-unit-all
      - name: Publish coverage to Qlty
        if: inputs.upload_coverage && matrix.ruby_version == '3.4'
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: |
            ${{ github.workspace }}/gems/vajra/coverage/.resultset.json

  test_e2e:
    name: E2E Tests · Ruby ${{ matrix.ruby_version }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [rubocop, reek]
    strategy:
      fail-fast: false
      matrix:
        ruby_version:
          - "3.2"
          - "3.4"
          - "4.0"
    steps:
      - uses: actions/checkout@v6
      - name: Install apt packages
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential git libyaml-dev pkg-config
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby_version }}
          bundler-cache: false
      - name: Restore bundle cache
        uses: actions/cache@v5
        with:
          path: ${{ env.BUNDLE_PATH }}
          key: ${{ runner.os }}-ruby-${{ matrix.ruby_version }}-bundle-${{ hashFiles('gems/**/Gemfile.lock', 'docs/Gemfile.lock', 'danger/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-ruby-${{ matrix.ruby_version }}-bundle-
      - name: Install bundles
        run: scripts/ci-install-bundles
        env:
          CI_RUBY_VERSION: ${{ matrix.ruby_version }}
      - name: Run e2e tests
        run: scripts/run-rspec-e2e-all

  build_package:
    name: Build Package
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [rubocop, reek]
    steps:
      - uses: actions/checkout@v6
      - name: Install apt packages
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential git libyaml-dev pkg-config
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: false
      - name: Restore bundle cache
        uses: actions/cache@v5
        with:
          path: ${{ env.BUNDLE_PATH }}
          key: ${{ runner.os }}-ruby-${{ env.RUBY_VERSION }}-bundle-${{ hashFiles('gems/**/Gemfile.lock', 'docs/Gemfile.lock', 'danger/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-ruby-${{ env.RUBY_VERSION }}-bundle-
      - name: Install bundles
        run: scripts/ci-install-bundles
        env:
          CI_RUBY_VERSION: ${{ env.RUBY_VERSION }}
      - name: Build package
        run: scripts/run-package-build-all
      - name: Run native C++ tests
        run: scripts/run-ctest-all

  build_docs:
    name: Build Docs
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [rubocop, reek]
    steps:
      - uses: actions/checkout@v6
      - name: Install apt packages
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential git libyaml-dev pkg-config
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: false
      - name: Restore bundle cache
        uses: actions/cache@v5
        with:
          path: ${{ env.BUNDLE_PATH }}
          key: ${{ runner.os }}-ruby-${{ env.RUBY_VERSION }}-bundle-${{ hashFiles('gems/**/Gemfile.lock', 'docs/Gemfile.lock', 'danger/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-ruby-${{ env.RUBY_VERSION }}-bundle-
      - name: Install bundles
        run: scripts/ci-install-bundles
        env:
          CI_RUBY_VERSION: ${{ env.RUBY_VERSION }}
      - name: Build docs
        run: scripts/run-docs-build-all
