<link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml" />
<script>
  (function () {
    var STORAGE_KEY = "jtd-theme";
    var mediaQuery = "(prefers-color-scheme: dark)";

    function apply(theme) {
      if (
        (theme === "dark" || theme === "light") &&
        window.jtd &&
        typeof window.jtd.setTheme === "function"
      ) {
        window.jtd.setTheme(theme);
      }
    }
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved === "dark" || saved === "light") {
      apply(saved);
    } else if (window.matchMedia && window.matchMedia(mediaQuery).matches) {
      apply("dark");
    }
    if (window.matchMedia) {
      var mq = window.matchMedia(mediaQuery);
      mq.addEventListener("change", function (e) {
        var locked = localStorage.getItem(STORAGE_KEY);
        if (!locked) apply(e.matches ? "dark" : "light");
      });
    }
    window.toggleTheme = function () {
      var next =
        localStorage.getItem(STORAGE_KEY) === "dark" ? "light" : "dark";
      localStorage.setItem(STORAGE_KEY, next);
      apply(next);
    };

    document.addEventListener("click", function (event) {
      if (!(event.target instanceof Element)) return;

      var themeLink = event.target.closest('a[href="#toggle-theme"]');
      if (!themeLink) return;

      event.preventDefault();
      window.toggleTheme();
    });
  })();
</script>
