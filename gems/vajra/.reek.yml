detectors:
  ControlParameter:
    exclude:
      - Vajra::CLI::Launcher#app
  UncommunicativeVariableName:
    accept:
      - e
      - _
  TooManyStatements:
    enabled: true
    max_statements: 25
  TooManyConstants:
    enabled: true
    max_constants: 10
  UtilityFunction:
    enabled: false
  NilCheck:
    enabled: true
    exclude:
      - Vajra::CLI::Launcher#normalize_setting_values
      - Vajra::Internal::Tracing#with_request_span
      - Vajra::Internal::Tracing#empty_to_nil
      - Vajra::Internal::Tracing#env_value
      - Vajra::Internal::Tracing#integer_or_nil
      - Vajra::Internal::Tracing#resolve_boolean
      - Vajra::Internal::Tracing#resolve_config
      - Vajra::Internal::Tracing#trace_context_value
  ManualDispatch:
    exclude:
      - Vajra::Internal::Tracing#attach_trace_context
      - Vajra::Internal::Tracing#build_instrument
      - Vajra::Internal::Tracing#configured_meter
      - Vajra::Internal::Tracing#configured_tracer_provider
      - Vajra::Internal::Tracing#current_span
      - Vajra::Internal::Tracing#extract_context
      - Vajra::Internal::Tracing#install_request_observability_callback
      - Vajra::Internal::Tracing#mark_span_success
      - Vajra::Internal::Tracing#record_span_exception
      - Vajra::Internal::Tracing#record_span_error
      - Vajra::Internal::Tracing#record_span_response_status
      - Vajra::Internal::Tracing#response_status_from
      - Vajra::Internal::Tracing#shutdown!
      - Vajra::Internal::Tracing#span_context_for
      - Vajra::Internal::Tracing#trace_context_value
  LongParameterList:
    exclude:
      - Vajra::Internal::Tracing#resolve_string
      - Vajra::Internal::Tracing#write_trace_state
  DuplicateMethodCall:
    exclude:
      - Vajra::Internal::Tracing#install_metric_instruments
exclude_paths:
  - performance/**/*
  - spec/**/*
  - bin/*
  - tmp/**/*
