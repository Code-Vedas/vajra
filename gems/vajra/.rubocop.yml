plugins:
  - rubocop-rspec
  - rubocop-performance
  - rubocop-rake
AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2

Layout/LineLength:
  Max: 160

Metrics/BlockLength:
  Max: 50

Metrics/MethodLength:
  Max: 60

Metrics/ModuleLength:
  Max: 300

Metrics/ParameterLists:
  Max: 10

Metrics/ClassLength:
  Max: 275

Metrics/AbcSize:
  Max: 30

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 15

RSpec/MultipleExpectations:
  Max: 30

RSpec/ExampleLength:
  Max: 60

RSpec/MultipleMemoizedHelpers:
  Max: 15

RSpec/NestedGroups:
  Max: 5

Style/Documentation:
  Enabled: false
