plugins:
  - rubocop-rspec
  - rubocop-performance
  - rubocop-thread_safety
  - rubocop-rake
  - rubocop-rails
AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  Exclude:
    - tmp/**/*
    - performance/tmp/**/*

Layout/LineLength:
  Max: 160

Metrics/BlockLength:
  Max: 50

Metrics/MethodLength:
  Max: 60

Metrics/ModuleLength:
  Max: 300
  Exclude:
    - spec/e2e/vajra/support/http_helpers.rb
    - performance/Rakefile

Metrics/ParameterLists:
  Max: 10

Metrics/ClassLength:
  Max: 300
  Exclude:
    - performance/Rakefile

Metrics/AbcSize:
  Max: 30
  Exclude:
    - spec/e2e/vajra/support/http_helpers.rb

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 15

RSpec/MultipleExpectations:
  Max: 30

RSpec/ExampleLength:
  Max: 60

RSpec/MultipleMemoizedHelpers:
  Max: 15

RSpec/NestedGroups:
  Max: 5

Style/Documentation:
  Enabled: false

Style/GlobalVars:
  Exclude:
    - ext/vajra/extconf.rb

Rails/NegateInclude:
  Exclude:
    - lib/vajra.rb

Rails/IndexWith:
  Exclude:
    - spec/e2e/spec_helper.rb

Rails/RakeEnvironment:
  Exclude:
    - performance/Rakefile

Rails/Pluck:
  Exclude:
    - spec/e2e/vajra/configuration_spec.rb

ThreadSafety/NewThread:
  Exclude:
    - performance/Rakefile
    - spec/e2e/vajra/support/http_helpers.rb

ThreadSafety/DirChdir:
  Exclude:
    - spec/vajra/railtie_spec.rb

RSpec/DescribeClass:
  Exclude:
    - spec/e2e/vajra/configuration_spec.rb
    - spec/e2e/vajra/error_responses_spec.rb
    - spec/e2e/vajra/framework_compatibility_spec.rb
    - spec/e2e/vajra/http_helpers_spec.rb
    - spec/e2e/vajra/lifecycle_spec.rb
    - spec/e2e/vajra/process_helpers_spec.rb
    - spec/e2e/vajra/rack_env_integration_spec.rb
    - spec/e2e/vajra/runtime_contract_spec.rb
    - spec/vajra/railtie_spec.rb
    - spec/e2e/vajra/h2c_integration_spec.rb
